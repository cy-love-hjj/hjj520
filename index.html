<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For 小何 💖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #ff7b9c;
    --pink-light: #ffb8cc;
    --peach: #ffb088;
    --bg-top: #fff0f3;
    --bg-mid: #ffe8f0;
    --bg-end: #ffe0ec;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(180deg, #fff0f3 0%, #ffe4ee 30%, #ffdce8 60%, #ffe0ec 100%);
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    display: flex;
    justify-content: center;
    padding: 24px 16px 60px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }

  /* ---- 云朵装饰 ---- */
  .clouds {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.55);
    border-radius: 50%;
    animation: drift linear infinite;
  }
  @keyframes drift {
    0% { transform: translateX(-120px); }
    100% { transform: translateX(calc(100vw + 120px)); }
  }
  .cloud::before, .cloud::after {
    content: ''; position: absolute; background: inherit; border-radius: 50%;
  }

  /* ---- 飘落小心心 ---- */
  @keyframes fall {
    0%   { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
  }
  .falling-heart {
    position: fixed; pointer-events: none; z-index: 1;
    font-size: 22px;
    animation: fall linear infinite;
  }

  /* ---- 主容器 ---- */
  .main-wrap {
    position: relative; z-index: 2;
    width: 100%; max-width: 400px;
    display: flex; flex-direction: column; align-items: center;
    gap: 20px;
  }

  /* ---- 头部 ---- */
  .header {
    text-align: center; margin-bottom: 4px;
  }
  .header .icon-row { font-size: 36px; margin-bottom: 4px; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .header h1 {
    font-size: 26px; font-weight: 800; color: #e8456b;
    letter-spacing: 2px;
    text-shadow: 0 2px 8px rgba(232,69,107,0.15);
  }
  .header .sub {
    font-size: 13px; color: #d49ba8; margin-top: 2px; letter-spacing: 1px;
  }

  /* ---- 模块卡片 ---- */
  .module {
    width: 100%;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 28px;
    box-shadow: 0 8px 32px rgba(255,120,150,0.12), 0 2px 0 rgba(255,255,255,0.8) inset;
    overflow: hidden;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 2.5px solid transparent;
  }
  .module.open {
    border-color: rgba(255,140,160,0.3);
    box-shadow: 0 12px 40px rgba(255,120,150,0.2), 0 2px 0 rgba(255,255,255,0.8) inset;
  }

  /* ---- 模块按钮头 ---- */
  .mod-btn {
    width: 100%; padding: 20px 24px;
    display: flex; align-items: center; gap: 14px;
    background: none; border: none;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .mod-btn:active { background: rgba(255,120,150,0.06); }

  .mod-icon {
    width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .mod-icon.photos { background: #fff0f5; }
  .mod-icon.video  { background: #fff5ee; }
  .mod-icon.letter { background: #f5f0ff; }

  .mod-info { text-align: left; flex: 1; }
  .mod-info .mod-title {
    font-size: 18px; font-weight: 700; color: #d4446a;
    letter-spacing: 1px;
  }
  .mod-info .mod-hint {
    font-size: 12px; color: #d49ba8; margin-top: 2px;
  }

  .mod-arrow {
    font-size: 18px; color: #e8a0b5;
    transition: transform 0.35s;
  }
  .module.open .mod-arrow { transform: rotate(180deg); }

  /* ---- 模块内容区 ---- */
  .mod-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1), padding 0.35s;
    padding: 0 24px;
  }
  .module.open .mod-body {
    max-height: 600px;
    padding: 0 24px 24px;
  }

  /* 照片区 */
  .photo-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .photo-placeholder {
    aspect-ratio: 1;
    border-radius: 16px;
    background: linear-gradient(135deg, #ffe0ea, #ffd1dc);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    border: 2px dashed #ffc0d0;
  }
  .mod-body .tip-text {
    text-align: center; font-size: 13px; color: #d49ba8;
    margin-top: 12px;
  }

  /* 视频区 */
  .video-placeholder {
    width: 100%; aspect-ratio: 16/10;
    border-radius: 16px;
    background: linear-gradient(135deg, #fff0e8, #ffe8d8);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; font-size: 40px;
    border: 2px dashed #ffd0b8;
  }
  .video-placeholder .play-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,140,100,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }

  /* 信区 */
  .letter-card {
    background: linear-gradient(135deg, #fffdf5, #fff8f0);
    border-radius: 16px; padding: 20px;
    border: 1.5px solid #ffe8d0;
    font-size: 15px; color: #a07060; line-height: 1.8;
    position: relative;
  }
  .letter-card::before {
    content: '💌';
    position: absolute; top: -16px; right: 16px;
    font-size: 28px;
  }
  .letter-card .dear {
    font-weight: 700; font-size: 16px; color: #c06050;
  }
  .letter-card .sign {
    margin-top: 12px; text-align: right;
    font-weight: 600; color: #c08070;
  }

  /* ---- 音乐按钮 ---- */
  .music-btn {
    position: fixed; top: 20px; right: 20px; z-index: 30;
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid #ffccd5;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(255,120,150,0.12);
    transition: all 0.3s;
  }
  .music-btn.playing {
    border-color: #ff6b81;
    animation: musicGlow 2s ease-in-out infinite;
  }
  @keyframes musicGlow {
    0%, 100% { box-shadow: 0 4px 12px rgba(255,120,150,0.12); }
    50% { box-shadow: 0 4px 24px rgba(255,120,150,0.35); }
  }

  @media (prefers-reduced-motion: reduce) {
    .cloud, .falling-heart, .header .icon-row { animation: none; }
    .music-btn.playing { animation: none; }
  }
</style>
</head>
<body>

<div class="clouds" id="clouds"></div>
<button class="music-btn" id="musicBtn" onclick="toggleMusic(event)" title="音乐">🎵</button>

<main class="main-wrap">
  <header class="header">
    <div class="icon-row">💖</div>
    <h1>小何专属</h1>
    <p class="sub">每个模块都是我的心意</p>
  </header>

  <!-- 模块1: with u -->
  <div class="module" id="modPhotos">
    <button class="mod-btn" onclick="toggleModule('modPhotos')">
      <div class="mod-icon photos">📸</div>
      <div class="mod-info">
        <div class="mod-title">with u</div>
        <div class="mod-hint">我们的每一帧回忆</div>
      </div>
      <span class="mod-arrow">▼</span>
    </button>
    <div class="mod-body">
      <div class="photo-grid">
        <div class="photo-placeholder">🖼️</div>
        <div class="photo-placeholder">🖼️</div>
        <div class="photo-placeholder">🖼️</div>
        <div class="photo-placeholder">🖼️</div>
      </div>
      <p class="tip-text">💝 把合照放进来，填满这个相册吧</p>
    </div>
  </div>

  <!-- 模块2: gift -->
  <div class="module" id="modVideo">
    <button class="mod-btn" onclick="toggleModule('modVideo')">
      <div class="mod-icon video">🎬</div>
      <div class="mod-info">
        <div class="mod-title">gift</div>
        <div class="mod-hint">一段想对你说的话</div>
      </div>
      <span class="mod-arrow">▼</span>
    </button>
    <div class="mod-body">
      <div class="video-placeholder">
        <div class="play-icon">▶️</div>
        <span style="font-size:14px;color:#c09070;">视频占位 — 上传你的视频</span>
      </div>
      <p class="tip-text">🎁 录一段想对她说的话吧</p>
    </div>
  </div>

  <!-- 模块3: letter -->
  <div class="module" id="modLetter">
    <button class="mod-btn" onclick="toggleModule('modLetter')">
      <div class="mod-icon letter">💌</div>
      <div class="mod-info">
        <div class="mod-title">letter</div>
        <div class="mod-hint">一封手写的信</div>
      </div>
      <span class="mod-arrow">▼</span>
    </button>
    <div class="mod-body">
      <div class="letter-card">
        <p class="dear">亲爱的小何：</p>
        <br>
        <p>这封信的位置，我预留给你。</p>
        <p>写下你想对她说的话，</p>
        <p>肉麻一点也没关系。</p>
        <br>
        <p>她会懂的。</p>
        <p class="sign">—— 你的专属后勤部长 💖</p>
      </div>
    </div>
  </div>

</main>

<script>
  // ---- 模块折叠 ----
  function toggleModule(id) {
    const mod = document.getElementById(id);
    const isOpen = mod.classList.contains('open');
    // 关闭所有
    document.querySelectorAll('.module.open').forEach(m => m.classList.remove('open'));
    // 打开当前（除非它本来开着）
    if (!isOpen) mod.classList.add('open');
  }

  // ---- 飘落的爱心 ----
  const heartsEmoji = ['💖', '💕', '💗', '🌸', '✨', '💝'];
  function spawnHeart() {
    const el = document.createElement('span');
    el.className = 'falling-heart';
    el.textContent = heartsEmoji[Math.floor(Math.random() * heartsEmoji.length)];
    el.style.left = Math.random() * 95 + '%';
    el.style.fontSize = (16 + Math.random() * 24) + 'px';
    el.style.animationDuration = (8 + Math.random() * 12) + 's';
    el.style.animationDelay = Math.random() * 5 + 's';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
  for (let i = 0; i < 14; i++) spawnHeart();
  setInterval(spawnHeart, 1500);

  // ---- 云朵 ----
  const clouds = document.getElementById('clouds');
  function spawnCloud() {
    const c = document.createElement('div');
    c.className = 'cloud';
    const w = 60 + Math.random() * 100;
    const h = w * 0.5;
    c.style.width = w + 'px';
    c.style.height = h + 'px';
    c.style.top = (5 + Math.random() * 70) + '%';
    c.style.animationDuration = (25 + Math.random() * 40) + 's';
    clouds.appendChild(c);
    c.addEventListener('animationend', () => c.remove());
  }
  for (let i = 0; i < 6; i++) { spawnCloud(); }
  setInterval(spawnCloud, 20000);

  // ---- 音乐播放器 ----
  let audioCtx = null, musicPlaying = false, musicTimer = null;
  const musicBtn = document.getElementById('musicBtn');

  const melody = [
    { f: 523.25, d: 0.55 }, { f: 587.33, d: 0.30 }, { f: 659.25, d: 0.55 }, { f: 783.99, d: 0.55 },
    { f: 880.00, d: 0.80 }, { f: 783.99, d: 0.35 }, { f: 659.25, d: 0.30 }, { f: 0, d: 0.25 },
    { f: 659.25, d: 0.55 }, { f: 587.33, d: 0.30 }, { f: 523.25, d: 0.55 }, { f: 659.25, d: 0.55 },
    { f: 587.33, d: 0.80 }, { f: 523.25, d: 0.35 }, { f: 440.00, d: 0.30 }, { f: 0, d: 0.30 },
    { f: 440.00, d: 0.55 }, { f: 523.25, d: 0.30 }, { f: 587.33, d: 0.55 }, { f: 659.25, d: 0.55 },
    { f: 783.99, d: 0.55 }, { f: 659.25, d: 0.55 }, { f: 783.99, d: 0.55 }, { f: 880.00, d: 0.55 },
    { f: 0, d: 0.30 },
    { f: 880.00, d: 0.55 }, { f: 783.99, d: 0.30 }, { f: 1046.50, d: 0.55 }, { f: 880.00, d: 0.55 },
    { f: 783.99, d: 0.80 }, { f: 659.25, d: 0.35 }, { f: 587.33, d: 0.30 }, { f: 0, d: 0.30 },
    { f: 659.25, d: 0.55 }, { f: 587.33, d: 0.30 }, { f: 523.25, d: 0.55 }, { f: 587.33, d: 0.55 },
    { f: 659.25, d: 0.55 }, { f: 523.25, d: 0.55 }, { f: 440.00, d: 0.55 }, { f: 523.25, d: 0.55 },
    { f: 0, d: 0.25 },
    { f: 523.25, d: 0.55 }, { f: 659.25, d: 0.55 }, { f: 587.33, d: 0.55 }, { f: 523.25, d: 0.55 },
    { f: 440.00, d: 1.00 }, { f: 0, d: 0.80 },
  ];

  function playNote(freq, dur) {
    if (!audioCtx || !musicPlaying) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.10, now + 0.06);
    gain.gain.setValueAtTime(0.10, now + dur * 0.5);
    gain.gain.linearRampToValueAtTime(0, now + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + dur + 0.08);
    if (freq > 0) {
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(freq * 2, now);
      gain2.gain.setValueAtTime(0, now);
      gain2.gain.linearRampToValueAtTime(0.025, now + 0.04);
      gain2.gain.linearRampToValueAtTime(0, now + dur);
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.start(now);
      osc2.stop(now + dur + 0.05);
    }
  }

  function playMelody() {
    if (!musicPlaying) return;
    let delay = 0;
    melody.forEach(n => {
      if (n.f > 0) setTimeout(() => playNote(n.f, n.d), delay * 1000);
      delay += n.d;
    });
    const total = melody.reduce((s, n) => s + n.d, 0);
    musicTimer = setTimeout(playMelody, (total + 1.0) * 1000);
  }

  function startMusic() {
    if (musicPlaying) return;
    musicPlaying = true;
    musicBtn.textContent = '🎶';
    musicBtn.classList.add('playing');
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    playMelody();
  }

  function stopMusic() {
    musicPlaying = false;
    musicBtn.textContent = '🎵';
    musicBtn.classList.remove('playing');
    if (musicTimer) clearTimeout(musicTimer);
  }

  function toggleMusic(event) {
    event.stopPropagation();
    musicPlaying ? stopMusic() : startMusic();
  }

  let autoStarted = false;
  document.addEventListener('click', () => {
    if (!autoStarted) { autoStarted = true; startMusic(); }
  }, { once: false });
</script>

</body>
</html>
